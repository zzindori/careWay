name: CareWay 지역 복지 수집 로봇

on:
  push:
    branches:
      - main
    paths:
      - 'batch/local_welfare_*.py'
      - 'supabase/migrations/**'
      - '.github/workflows/local_welfare_crawler.yml'
  workflow_dispatch:
    inputs:
      target:
        description: '수집 대상'
        required: false
        default: 'pilot'
        type: choice
        options:
          - pilot
          - nationwide
      reset_existing:
        description: '기존 지역 수집 데이터 삭제 후 재수집'
        required: false
        default: false
        type: boolean
      promote_warnings:
        description: '품질 경고가 있는 후보도 welfare_services로 승격'
        required: false
        default: false
        type: boolean

concurrency:
  group: careway-local-welfare-crawler
  cancel-in-progress: true

jobs:
  crawl:
    name: 지자체 복지 웹 수집
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      LOCAL_WELFARE_CRAWL_TARGET: ${{ inputs.target }}
      LOCAL_WELFARE_RESET_EXISTING: ${{ inputs.reset_existing || 'false' }}
      LOCAL_WELFARE_PROMOTE_WARNINGS: ${{ inputs.promote_warnings || 'false' }}
      LOCAL_WELFARE_REPORT_PATH: batch/output/local_welfare_report.json

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: batch/requirements.txt

      - name: 패키지 설치
        run: pip install -r batch/requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install --with-deps chromium

      - name: 지역 복지 수집 실행
        run: python batch/local_welfare_batch.py

      - name: 수집 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-welfare-report
          path: batch/output/local_welfare_report.json
          if-no-files-found: warn
