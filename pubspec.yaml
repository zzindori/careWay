name: careway
description: "CareWay - 부모님 복지 혜택 매니저"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.5+1

  # Backend (Supabase)
  supabase_flutter: ^2.8.0

  # Localization
  intl: ^0.20.2

  # URL 열기 (복지 신청 링크)
  url_launcher: ^6.3.0

  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon/careway_icon.png
  remove_alpha_ios: true
