name: CareWay 지역 복지 수집 로봇

on:
  push:
    branches:
      - main
    paths:
      - 'batch/local_welfare_*.py'
      - 'batch/advance_local_region_queue.py'
      - 'batch/config/local_welfare_region_queue.json'
      - 'supabase/migrations/**'
      - '.github/workflows/local_welfare_crawler.yml'
  schedule:
    - cron: '15 */3 * * *'
    - cron: '20 3 1 * *'
    - cron: '35 3 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      run_profile:
        description: '실행 프로필 (신규수집/정기재검증)'
        required: false
        default: 'discovery'
        type: choice
        options:
          - discovery
          - recheck
      target:
        description: '수집 대상'
        required: false
        default: 'pilot'
        type: choice
        options:
          - pilot
          - nationwide
      reset_existing:
        description: '기존 지역 수집 데이터 삭제 후 재수집'
        required: false
        default: false
        type: boolean
      promote_warnings:
        description: '품질 경고가 있는 후보도 welfare_services로 승격'
        required: false
        default: false
        type: boolean

concurrency:
  group: careway-local-welfare-crawler
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  crawl:
    name: 지자체 복지 웹 수집
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      LOCAL_WELFARE_CRAWL_TARGET: ${{ inputs.target }}
      LOCAL_WELFARE_RESET_EXISTING: ${{ inputs.reset_existing || 'false' }}
      LOCAL_WELFARE_PROMOTE_WARNINGS: ${{ inputs.promote_warnings || 'false' }}
      LOCAL_WELFARE_RUN_PROFILE: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_profile == 'recheck') && 'recheck' || 'discovery' }}
      LOCAL_WELFARE_RECHECK_DAYS: '30'
      LOCAL_WELFARE_MAX_ACTIVE_REGIONS: '20'
      LOCAL_WELFARE_ADVANCE_BATCH_SIZE: '3'
      LOCAL_WELFARE_AUTO_ADVANCE_QUEUE: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_profile == 'recheck') && 'false' || 'true' }}
      LOCAL_WELFARE_REPORT_PATH: batch/output/local_welfare_report.json

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: batch/requirements.txt

      - name: 패키지 설치
        run: pip install -r batch/requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install --with-deps chromium

      - name: 지역 큐 SQL 마이그레이션 적용
        run: python batch/apply_sql_migrations.py

      - name: 전국 시군구 DB 큐 자동 시드
        run: python batch/seed_all_sigungu_queue.py

      - name: 지역 복지 수집 실행
        if: github.event_name != 'schedule' || github.event.schedule == '15 */3 * * *'
        run: python batch/local_welfare_batch.py

      - name: 지역 복지 수집 실행 (월간/분기 재검증)
        if: github.event_name == 'schedule' && (github.event.schedule == '20 3 1 * *' || github.event.schedule == '35 3 1 1,4,7,10 *')
        env:
          LOCAL_WELFARE_RUN_PROFILE: 'recheck'
          LOCAL_WELFARE_AUTO_ADVANCE_QUEUE: 'false'
        run: python batch/local_welfare_batch.py

      - name: 자동 지역 큐 승급 (성공 실행 시)
        if: always()
        run: python batch/advance_local_region_queue.py

      - name: 수집 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-welfare-report
          path: batch/output/local_welfare_report.json
          if-no-files-found: warn

      - name: 최신 수집 리포트 커밋
        if: always()
        run: |
          if [ ! -f batch/output/local_welfare_report.json ]; then
            echo "No local welfare report to commit"
            exit 0
          fi
          cp batch/output/local_welfare_report.json batch/output/latest_local_welfare_report.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add batch/output/latest_local_welfare_report.json batch/config/local_welfare_region_queue.json
          if git diff --cached --quiet; then
            echo "No report changes"
            exit 0
          fi
          git commit -m "chore(batch): update local welfare report and region queue"
          git pull --rebase origin main
          git push origin HEAD:main
