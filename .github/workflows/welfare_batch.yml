name: CareWay 복지서비스 배치

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 새벽 1시 KST

  workflow_dispatch:
    inputs:
      phase:
        description: '실행할 Phase (0=지자체목록, 0_detail=상세수집, 1=복지로API, 2=AI분류, both=전체)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - '0'
          - '0_detail'
          - '1'
          - '2'
          - 'fix_region'
          - 'fix_cmmcd'
          - 'fix_all'

jobs:
  batch:
    name: 복지서비스 데이터 수집 & AI 분류
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: batch/requirements.txt

      - name: 패키지 설치
        run: pip install -r batch/requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install --with-deps chromium

      # Phase 0 목록 수집 → 매일 자동 + 수동 '0' 선택
      - name: Phase 0 - 지자체복지서비스 목록 수집
        if: ${{ inputs.phase == '0' }}
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WELFARE_API_KEY: ${{ secrets.WELFARE_API_KEY }}
          LOCAL_WELFARE_API_KEY: ${{ secrets.LOCAL_WELFARE_API_KEY }}
        run: python batch/welfare_ai_processor.py --phase 0

      # Phase 0 Detail → 매일 자동 + 수동 '0_detail' 선택
      - name: Phase 0 Detail - 지자체복지서비스 상세 수집
        if: ${{ github.event_name == 'schedule' || inputs.phase == 'both' || inputs.phase == '0_detail' }}
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WELFARE_API_KEY: ${{ secrets.WELFARE_API_KEY }}
          LOCAL_WELFARE_API_KEY: ${{ secrets.LOCAL_WELFARE_API_KEY }}
          PHASE0_DETAIL_LIMIT: "1500"
        run: python batch/welfare_ai_processor.py --phase 0_detail

      # Phase 1 복지로 API → 매일 자동 + 수동 '1' 선택
      - name: Phase 1 - 복지로 API 상세 수집
        if: ${{ github.event_name == 'schedule' || inputs.phase == 'both' || inputs.phase == '1' }}
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WELFARE_API_KEY: ${{ secrets.WELFARE_API_KEY }}
          LOCAL_WELFARE_API_KEY: ${{ secrets.LOCAL_WELFARE_API_KEY }}
        run: python batch/welfare_ai_processor.py --phase 1

      # Phase 2 AI 분류 → 매일 자동 + 수동 '2' 선택
      - name: Phase 2 - Gemini AI 분류
        if: ${{ github.event_name == 'schedule' || inputs.phase == 'both' || inputs.phase == '2' }}
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WELFARE_API_KEY: ${{ secrets.WELFARE_API_KEY }}
          LOCAL_WELFARE_API_KEY: ${{ secrets.LOCAL_WELFARE_API_KEY }}
        run: python batch/welfare_ai_processor.py --phase 2

      - name: Fix Region - 지역 후처리
        if: ${{ github.event_name == 'schedule' || inputs.phase == 'both' || inputs.phase == 'fix_region' }}
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WELFARE_API_KEY: ${{ secrets.WELFARE_API_KEY }}
          LOCAL_WELFARE_API_KEY: ${{ secrets.LOCAL_WELFARE_API_KEY }}
        run: python batch/welfare_ai_processor.py --phase fix_region