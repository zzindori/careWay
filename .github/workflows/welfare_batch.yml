name: CareWay 복지서비스 배치

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 새벽 1시 KST

  workflow_dispatch:
    inputs:
      phase:
        description: '실행할 작업'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - collect
          - reclassify
          - repair
          - repair_force_search

concurrency:
  group: careway-welfare-batch
  cancel-in-progress: false

jobs:
  batch:
    name: 복지서비스 데이터 수집 & AI 분류
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      WELFARE_API_KEY: ${{ secrets.WELFARE_API_KEY }}
      LOCAL_WELFARE_API_KEY: ${{ secrets.LOCAL_WELFARE_API_KEY }}
      SOCIAL_SERVICE_API_KEY: ${{ secrets.SOCIAL_SERVICE_API_KEY }}
      BATCH_PHASE: ${{ github.event_name == 'schedule' && 'daily' || inputs.phase }}
      PHASE0_DETAIL_LIMIT: "1500"
      PHASE1_WEB_LIMIT: ${{ github.event_name == 'schedule' && '120' || '300' }}
      PHASE2_LIMIT: ${{ github.event_name == 'schedule' && '400' || '1000' }}
      PHASE2R_LIMIT: "800"
      FIX_SEARCH_TOKENS_MAX_SCAN: "12000"
      FIX_SEARCH_TOKENS_BATCH: "400"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: batch/requirements.txt

      - name: 패키지 설치
        run: pip install -r batch/requirements.txt

      - name: 배치 실행
        run: python batch/welfare_ai_processor.py --phase "$BATCH_PHASE"